<!doctype html>
<html>
<head>
    <title>Editar Libro</title>
</head>
<body>

<h2>Editar Libro</h2>

<form action="/actualizar/{{ libro.sd }}" method="POST" autocomplete="off">

    <p>ID (no editable):</p>
    <input type="text" value="{{ libro._id }}" disabled>
    <br><br>

    <input type="text" name="titulo" value="{{ libro.titulo }}" required><br><br>
    <input type="number" name="paginas" value="{{ libro.paginas }}" required><br><br>
    <input type="text" name="editorial" value="{{ libro.editorial }}" required><br><br>
    <input type="text" name="isbn" value="{{ libro.isbn }}" required><br><br>
    <input type="number" step="0.01" name="costo" value="{{ libro.costo }}" required><br><br>

    <button type="submit">Actualizar</button>
</form>

<br>
<a href="/">Volver</a>

</body>
</html>
